# This rule is not used by the project shop-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over notify.shophub.local.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: shop-operator
    app.kubernetes.io/managed-by: kustomize
  name: notify-discordchannel-admin-role
rules:
- apiGroups:
  - notify.shophub.local
  resources:
  - discordchannels
  verbs:
  - '*'
- apiGroups:
  - notify.shophub.local
  resources:
  - discordchannels/status
  verbs:
  - get
