apiVersion: apps.shophub.local/v1
kind: Shop
metadata:
  labels:
    app.kubernetes.io/name: shop-operator
    app.kubernetes.io/managed-by: kustomize
  name: shop-sample
spec:
  # Storefront display name shown to buyers.
  title: "Demo Store"
  # standard => 2 replicas, high => 3 replicas.
  availability: standard
  # postgres (CNPG) or mongodb (MongoDB Community operator).
  database: postgres
  # On-chain address where buyers send payment (Sepolia USDT).
  walletAddress: "0x45bE1a4b8b09F6c7B2C0E1F3a4d5e6f7a8b9C060"
  # Optional: route this shop's alerts to a Discord webhook Secret
  # (key "webhook-url"), typically created by a DiscordChannel CR.
  # discordWebhookSecretRef:
  #   name: discordchannel-sample-webhook
