---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: shops.apps.shophub.local
spec:
  group: apps.shophub.local
  names:
    categories:
    - shophub
    kind: Shop
    listKind: ShopList
    plural: shops
    shortNames:
    - sh
    singular: shop
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.title
      name: TITLE
      type: string
    - jsonPath: .spec.database
      name: DB
      type: string
    - jsonPath: .status.readyReplicas
      name: READY
      type: integer
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Shop is the Schema for the shops API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Shop
            properties:
              availability:
                default: standard
                description: 'Availability maps to replica count: standard=2, high=3.'
                enum:
                - standard
                - high
                type: string
              database:
                default: postgres
                description: Database picks the DB operator that provisions persistence
                  for this shop.
                enum:
                - postgres
                - mongodb
                type: string
              discordWebhookSecretRef:
                description: |-
                  DiscordWebhookSecretRef points to a Secret with the Discord webhook URL.
                  If nil, Discord notifications are skipped for this shop.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              image:
                description: |-
                  Image overrides the default Shop container image.
                  Used by CI/CD to bump shop image without touching the operator chart.
                type: string
              title:
                description: Title is the storefront display name shown to buyers.
                type: string
              walletAddress:
                description: |-
                  WalletAddress is the public crypto address where buyers send payment.
                  Owner-supplied; not validated on-chain by the operator.
                type: string
            required:
            - availability
            - database
            - title
            - walletAddress
            type: object
          status:
            description: status defines the observed state of Shop
            properties:
              conditions:
                description: Conditions track high-level reconcile state (Available,
                  Progressing, Degraded).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              databaseSecret:
                description: |-
                  DatabaseSecret is the name of the Secret holding DB credentials
                  (auto-created by CNPG for postgres or MongoDB operator for mongodb).
                type: string
              readyReplicas:
                description: ReadyReplicas mirrors the Deployment's readyReplicas.
                format: int32
                type: integer
              url:
                description: URL is the ingress hostname where the storefront is reachable.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
